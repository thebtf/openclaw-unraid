version: "3.8"

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    hostname: OpenClaw
    restart: unless-stopped
    user: root

    ports:
      - "18789:18789"

    volumes:
      # Config and state (openclaw.json, sessions, credentials)
      - ./config:/root/.openclaw:rw
      # Agent workspace (SOUL.md, MEMORY.md, projects)
      - ./workspace:/home/node/clawd:rw
      # Homebrew packages (persists brew/go/npm installs)
      - ./homebrew:/home/linuxbrew/.linuxbrew:rw
      # Gateway logs (kept out of the container overlay fs).
      # OpenClaw always writes to /tmp/openclaw regardless of logging.file (see issue #61295),
      # so we mount /tmp/openclaw directly.
      - ./logs:/tmp/openclaw:rw
      # Bootstrap script (idempotent merge via `openclaw config set`)
      - ./scripts/bootstrap.sh:/usr/local/lib/openclaw-bootstrap.sh:ro

    environment:
      - TZ=${TZ:-UTC}
      # REQUIRED
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:?Gateway token required}
      # REQUIRED since OpenClaw 2026.2: comma-separated browser origins for the Control UI.
      # Example: http://192.168.1.41:18789  or  http://192.168.1.41:18789,http://openclaw.local:18789
      - OPENCLAW_ALLOWED_ORIGINS=${OPENCLAW_ALLOWED_ORIGINS:?Allowed origins required (e.g. http://YOUR-IP:18789)}
      # Custom LLM endpoint (optional) -- LiteLLM, vLLM, Ollama, OpenRouter proxy, etc.
      - CUSTOM_LLM_BASE_URL=${CUSTOM_LLM_BASE_URL:-}
      - CUSTOM_LLM_API_KEY=${CUSTOM_LLM_API_KEY:-}
      - CUSTOM_LLM_API_TYPE=${CUSTOM_LLM_API_TYPE:-openai-completions}
      - CUSTOM_LLM_MODEL_ID=${CUSTOM_LLM_MODEL_ID:-}
      # Control UI device-auth toggle (default true for LAN/homelab over plain HTTP)
      - OPENCLAW_DISABLE_DEVICE_AUTH=${OPENCLAW_DISABLE_DEVICE_AUTH:-true}
      # Log rotation tuning (only maxFileBytes is in the schema; archive count is hardcoded to 5)
      - OPENCLAW_LOG_MAX_FILE_BYTES=${OPENCLAW_LOG_MAX_FILE_BYTES:-26214400}
      # Built-in LLM providers (use one of these OR Custom LLM Base URL)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      # Optional channels
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      # System PATH including Homebrew
      - PATH=/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/root/.bun/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    # Bootstrap script lives at scripts/bootstrap.sh -- mounted read-only into the container.
    # Idempotent: re-runs every start, merges managed fields via `openclaw config set`.
    entrypoint: ["/bin/sh", "/usr/local/lib/openclaw-bootstrap.sh"]

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

# ==============================================================================
# QUICK START
# ==============================================================================
#
# 1. Create .env file:
#    OPENCLAW_GATEWAY_TOKEN=your-secret-token
#    OPENCLAW_ALLOWED_ORIGINS=http://localhost:18789
#    ANTHROPIC_API_KEY=sk-ant-...        # OR use a custom router below:
#    # CUSTOM_LLM_BASE_URL=http://litellm:4000/v1
#    # CUSTOM_LLM_API_KEY=sk-...
#    # CUSTOM_LLM_API_TYPE=openai-completions
#
# 2. Start:
#    docker compose up -d
#
# 3. Access Control UI:
#    http://localhost:18789/?token=YOUR_TOKEN
#
# NOTE: First start takes ~60 seconds while Homebrew installs.
#       Subsequent starts are fast (Homebrew persists in the volume).
#
# ==============================================================================
